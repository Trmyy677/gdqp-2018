<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDQP&AN 2018 - Hệ Thống Quản Lý</title>
    
    <!-- Các thư viện hỗ trợ chạy React trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
      body { font-family: 'Inter', sans-serif; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;
      const { 
        ShieldCheck, BookOpen, PlaySquare, MessageCircle, Menu, X, Send, 
        User, Bot, AlertCircle, FilePlus, Save, 
        Trash2, FileText, Download, Upload, Eye, Lock, Unlock, MessageSquare, Filter, CheckCircle2 
      } = Lucide;

      // --- CẤU HÌNH ---
      const GRADES = ["Khối 10", "Khối 11", "Khối 12"];
      const PROGRAMS = ["Cánh Diều", "Kết nối tri thức", "Chân trời sáng tạo"];

      const App = () => {
        const [activeTab, setActiveTab] = useState('home');
        const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
        const [isAdmin, setIsAdmin] = useState(false);

        const [uploadedFiles, setUploadedFiles] = useState(() => {
          const saved = localStorage.getItem('gdqp_files_final');
          return saved ? JSON.parse(saved) : [];
        });

        const [feedbacks, setFeedbacks] = useState(() => {
          const saved = localStorage.getItem('gdqp_feedbacks_final');
          return saved ? JSON.parse(saved) : [];
        });

        useEffect(() => {
          localStorage.setItem('gdqp_files_final', JSON.stringify(uploadedFiles));
        }, [uploadedFiles]);

        useEffect(() => {
          localStorage.setItem('gdqp_feedbacks_final', JSON.stringify(feedbacks));
        }, [feedbacks]);

        // Các component con (Theory, Feedback, Chat...) nằm bên trong App hoặc khai báo ở ngoài
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col">
            <header className="bg-emerald-900 text-white shadow-xl sticky top-0 z-50">
              <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setActiveTab('home')}>
                  <ShieldCheck size={32} className="text-yellow-400" />
                  <span className="text-xl font-bold uppercase tracking-tighter">GDQP&AN PRO</span>
                </div>
                <nav className="hidden md:flex items-center space-x-1">
                  <button onClick={() => setActiveTab('home')} className={`px-3 py-2 rounded-lg ${activeTab === 'home' ? 'bg-emerald-700' : ''}`}>Trang chủ</button>
                  <button onClick={() => setActiveTab('theory')} className={`px-3 py-2 rounded-lg ${activeTab === 'theory' ? 'bg-emerald-700' : ''}`}>Tài liệu</button>
                  <button onClick={() => setActiveTab('practice')} className={`px-3 py-2 rounded-lg ${activeTab === 'practice' ? 'bg-emerald-700' : ''}`}>Video</button>
                  <button onClick={() => setActiveTab('feedback')} className={`px-3 py-2 rounded-lg ${activeTab === 'feedback' ? 'bg-emerald-700' : ''}`}>Góp ý</button>
                </nav>
                <div className="flex items-center space-x-3">
                  <button 
                    onClick={() => setIsAdmin(!isAdmin)}
                    className={`flex items-center space-x-2 px-4 py-1.5 rounded-full text-xs font-bold transition-all border ${isAdmin ? 'bg-yellow-500 text-emerald-950' : 'bg-emerald-800 text-emerald-300'}`}
                  >
                    {isAdmin ? <Unlock size={14} /> : <Lock size={14} />}
                    <span>{isAdmin ? 'QUẢN TRỊ' : 'NGƯỜI DÙNG'}</span>
                  </button>
                </div>
              </div>
            </header>

            <main className="flex-grow container mx-auto px-4 py-8">
              {activeTab === 'home' && <HomeView setActiveTab={setActiveTab} />}
              {activeTab === 'theory' && <TheoryView uploadedFiles={uploadedFiles} setUploadedFiles={setUploadedFiles} isAdmin={isAdmin} />}
              {activeTab === 'feedback' && <FeedbackView feedbacks={feedbacks} setFeedbacks={setFeedbacks} isAdmin={isAdmin} />}
              {activeTab === 'practice' && <PracticeView />}
            </main>
          </div>
        );
      };

      // --- VIEW COMPONENTS ---
      const HomeView = ({ setActiveTab }) => (
        <div className="text-center py-20">
          <h1 className="text-5xl font-black text-slate-800 mb-6">GIÁO DỤC <span className="text-emerald-600">QUỐC PHÒNG</span></h1>
          <p className="text-slate-500 mb-10">Hệ thống lưu trữ bài giảng và quản lý góp ý học sinh.</p>
          <div className="flex justify-center gap-4">
            <button onClick={() => setActiveTab('theory')} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-bold">Khám phá tài liệu</button>
          </div>
        </div>
      );

      const TheoryView = ({ uploadedFiles, setUploadedFiles, isAdmin }) => {
        const [filterGrade, setFilterGrade] = useState("Tất cả");
        const [filterProgram, setFilterProgram] = useState("Tất cả");
        const [showModal, setShowModal] = useState(false);
        const fileRef = useRef();

        const handleUpload = (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = () => {
              const newFile = {
                id: Date.now(),
                name: file.name,
                grade: filterGrade === "Tất cả" ? "Khối 10" : filterGrade,
                program: filterProgram === "Tất cả" ? "Cánh Diều" : filterProgram,
                date: new Date().toLocaleDateString(),
                size: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                content: reader.result
              };
              setUploadedFiles([newFile, ...uploadedFiles]);
              setShowModal(false);
            };
            reader.readAsDataURL(file);
          }
        };

        return (
          <div className="space-y-6">
            <div className="bg-white p-6 rounded-3xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4">
               <div className="flex gap-4">
                  <select onChange={e => setFilterGrade(e.target.value)} className="bg-slate-50 p-2 rounded-xl text-sm font-bold">
                    <option>Tất cả Khối</option>
                    {GRADES.map(g => <option key={g}>{g}</option>)}
                  </select>
                  <select onChange={e => setFilterProgram(e.target.value)} className="bg-slate-50 p-2 rounded-xl text-sm font-bold">
                    <option>Tất cả Chương trình</option>
                    {PROGRAMS.map(p => <option key={p}>{p}</option>)}
                  </select>
               </div>
               {isAdmin && (
                 <button onClick={() => setShowModal(true)} className="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2"><Upload size={18}/> Tải lên</button>
               )}
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              {uploadedFiles.map(file => (
                <div key={file.id} className="bg-white p-6 rounded-3xl border hover:shadow-xl transition-all">
                  <FileText className="text-red-500 mb-4" size={32} />
                  <h4 className="font-bold text-slate-800 mb-4 line-clamp-1">{file.name}</h4>
                  <div className="flex gap-2 mb-4">
                    <span className="text-[10px] bg-slate-100 px-2 py-1 rounded-full font-bold">{file.grade}</span>
                    <span className="text-[10px] bg-emerald-50 px-2 py-1 rounded-full font-bold text-emerald-700">{file.program}</span>
                  </div>
                  <div className="flex justify-between items-center border-t pt-4">
                    <button onClick={() => {
                      const link = document.createElement('a');
                      link.href = file.content;
                      link.download = file.name;
                      link.click();
                    }} className="text-blue-600 font-bold text-xs flex items-center gap-1"><Download size={14}/> Tải xuống</button>
                    {isAdmin && <button onClick={() => setUploadedFiles(uploadedFiles.filter(f => f.id !== file.id))} className="text-red-500"><Trash2 size={16}/></button>}
                  </div>
                </div>
              ))}
            </div>

            {showModal && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4">
                <div className="bg-white p-8 rounded-[40px] max-w-sm w-full">
                  <h3 className="text-xl font-black mb-6">Tải tài liệu mới</h3>
                  <input type="file" ref={fileRef} onChange={handleUpload} className="hidden" />
                  <button onClick={() => fileRef.current.click()} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold mb-4">Chọn File PDF</button>
                  <button onClick={() => setShowModal(false)} className="w-full text-slate-400 font-bold">Hủy bỏ</button>
                </div>
              </div>
            )}
          </div>
        );
      };

      const FeedbackView = ({ feedbacks, setFeedbacks, isAdmin }) => {
        const [text, setText] = useState('');
        return (
          <div className="max-w-4xl mx-auto grid md:grid-cols-2 gap-8">
            <div className="bg-white p-8 rounded-[40px] border shadow-sm h-fit">
              <h3 className="text-xl font-bold mb-4">Gửi góp ý ẩn danh</h3>
              <textarea value={text} onChange={e => setText(e.target.value)} className="w-full h-40 bg-slate-50 rounded-2xl p-4 outline-none mb-4" placeholder="Nhập ý kiến tại đây..."></textarea>
              <button onClick={() => {
                if(!text) return;
                setFeedbacks([{id:Date.now(), text, date: new Date().toLocaleString()}, ...feedbacks]);
                setText('');
              }} className="w-full bg-emerald-900 text-white py-4 rounded-2xl font-bold">Gửi ngay</button>
            </div>
            <div className="space-y-4">
              <h3 className="font-bold px-2">Danh sách góp ý</h3>
              {feedbacks.map(f => (
                <div key={f.id} className="bg-white p-4 rounded-2xl border relative group">
                  <p className="text-sm italic">"{f.text}"</p>
                  <span className="text-[10px] text-slate-400 mt-2 block">{f.date}</span>
                  {isAdmin && <button onClick={() => setFeedbacks(feedbacks.filter(x => x.id !== f.id))} className="absolute top-2 right-2 text-red-300 hover:text-red-600"><Trash2 size={14}/></button>}
                </div>
              ))}
            </div>
          </div>
        );
      };

      const PracticeView = () => (
        <div className="grid md:grid-cols-2 gap-8">
          <div className="bg-white p-4 rounded-3xl border shadow-sm">
             <div className="aspect-video bg-slate-100 rounded-2xl mb-4 flex items-center justify-center"><PlaySquare size={48} className="text-slate-300"/></div>
             <h4 className="font-bold">Hướng dẫn đội ngũ từng người</h4>
          </div>
          <div className="bg-white p-4 rounded-3xl border shadow-sm">
             <div className="aspect-video bg-slate-100 rounded-2xl mb-4 flex items-center justify-center"><PlaySquare size={48} className="text-slate-300"/></div>
             <h4 className="font-bold">Kỹ thuật tháo lắp súng AK</h4>
          </div>
        </div>
      );

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
