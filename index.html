<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GDQP&AN PRO - Firebase System</title>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDK (Phiên bản tương thích) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
</head>

<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyCv-1rm83gEJWR5k0KGSmm__yjRjpdkFwg",
  authDomain: "gdqp-2018.firebaseapp.com",
  projectId: "gdqp-2018",
  storageBucket: "gdqp-2018.firebasestorage.app",
  messagingSenderId: "926682253482",
  appId: "1:926682253482:web:49b5f8652d3e6f4e2e28d3",
  measurementId: "G-FWR66N32S7"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* ================= COMPONENT CHÍNH ================= */
const App = () => {
  const [user, setUser] = useState(null);
  const [isGuest, setIsGuest] = useState(false); // Chế độ khách
  const [tab, setTab] = useState("home");
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged(u => {
      setUser(u);
      if (u) setIsGuest(false); // Nếu đã đăng nhập thì tắt chế độ khách
      setLoading(false);
    });
    return () => unsubscribe();
  }, []);

  const isAdmin = user?.email === "khai.anh1505rm@gmail.com";

  if (loading) return <div className="h-screen flex items-center justify-center font-bold">Đang tải hệ thống...</div>;

  // Nếu chưa đăng nhập và chưa chọn chế độ khách thì hiện màn hình Login
  if (!user && !isGuest) {
    return <Login onGuest={() => setIsGuest(true)} />;
  }

  return (
    <div className="min-h-screen flex flex-col">
      <header className="bg-emerald-900 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setTab("home")}>
          <div className="bg-yellow-400 p-1 rounded text-emerald-900 font-black">⭐</div>
          <h1 className="font-bold tracking-tighter text-xl">GDQP&AN PRO</h1>
        </div>
        <div className="flex gap-4 font-medium text-sm">
          <button onClick={()=>setTab("home")} className={`hover:text-yellow-400 ${tab==='home'?'text-yellow-400':''}`}>Trang chủ</button>
          <button onClick={()=>setTab("files")} className={`hover:text-yellow-400 ${tab==='files'?'text-yellow-400':''}`}>Tài liệu</button>
          <button onClick={()=>setTab("chat")} className={`hover:text-yellow-400 ${tab==='chat'?'text-yellow-400':''}`}>AI Trợ lý</button>
          {user ? (
            <button onClick={() => auth.signOut()} className="bg-red-500 px-3 py-1 rounded text-xs">Thoát ({user.email.split('@')[0]})</button>
          ) : (
            <button onClick={() => setIsGuest(false)} className="bg-blue-500 px-3 py-1 rounded text-xs">Đăng nhập</button>
          )}
        </div>
      </header>

      <main className="p-6 flex-grow container mx-auto max-w-5xl">
        {tab==="home" && (
          <div className="text-center py-20">
            <h2 className="text-4xl font-black text-slate-800 mb-4">Hệ thống GDQP 2018</h2>
            <p className="text-slate-500">Học trực tuyến - Tra cứu AI - Quản lý tài liệu bài giảng.</p>
            {isGuest && <p className="mt-4 text-emerald-600 font-bold bg-emerald-50 inline-block px-4 py-1 rounded-full text-xs">Bạn đang xem với tư cách Khách</p>}
          </div>
        )}
        
        {tab==="files" && <Files isAdmin={isAdmin}/>}
        {tab==="chat" && <Chat/>}
      </main>

      <footer className="p-4 text-center text-slate-400 text-xs border-t bg-white">
        © 2024 GDQP&AN 2018 System - Powered by Firebase
      </footer>
    </div>
  );
};

/* ================= LOGIN & GUEST ================= */
const Login = ({ onGuest }) => {
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [isError, setIsError] = useState(false);

  const login = async () => {
    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) { 
      setIsError(true);
    }
  };

  return (
    <div className="fixed inset-0 bg-emerald-950 flex items-center justify-center z-[100] p-4">
      <div className="bg-white p-8 rounded-[40px] shadow-2xl w-full max-w-sm">
        <div className="text-center mb-8">
            <div className="bg-emerald-100 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4 text-3xl">🛡️</div>
            <h2 className="text-2xl font-black text-emerald-900">XÁC THỰC</h2>
            <p className="text-slate-400 text-sm">Vui lòng đăng nhập hoặc vào xem nhanh</p>
        </div>
        
        <div className="space-y-3">
          <input 
            placeholder="Email Admin" 
            onChange={e => setEmail(e.target.value)} 
            className="border-2 border-slate-100 p-4 rounded-2xl w-full outline-emerald-500 transition-all text-sm"
          />
          <input 
            type="password" 
            placeholder="Mật khẩu" 
            onChange={e => setPass(e.target.value)} 
            className="border-2 border-slate-100 p-4 rounded-2xl w-full outline-emerald-500 transition-all text-sm"
          />
          {isError && <p className="text-red-500 text-[10px] font-bold text-center uppercase">Sai thông tin đăng nhập!</p>}
          
          <button onClick={login} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold w-full py-4 rounded-2xl transition-all shadow-lg mt-2">ĐĂNG NHẬP ADMIN</button>
          
          <div className="relative py-4">
            <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-100"></div></div>
            <div className="relative flex justify-center text-xs"><span className="bg-white px-2 text-slate-400">HOẶC</span></div>
          </div>

          <button onClick={onGuest} className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold w-full py-4 rounded-2xl transition-all">VÀO CHẾ ĐỘ KHÁCH</button>
        </div>
      </div>
    </div>
  );
};

/* ================= QUẢN LÝ FILE ================= */
const Files = ({isAdmin}) => {
  const [files, setFiles] = useState([]);
  const [isUploading, setIsUploading] = useState(false);

  useEffect(() => {
    const unsub = db.collection("files").orderBy("id", "desc").onSnapshot(snap => {
      setFiles(snap.docs.map(d => ({...d.data(), docId: d.id})));
    }, err => console.log("Lỗi tải file:", err));
    return () => unsub();
  }, []);

  const upload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    setIsUploading(true);
    try {
      const fileName = Date.now() + "_" + file.name;
      const ref = storage.ref("files/" + fileName);
      await ref.put(file);
      const url = await ref.getDownloadURL();

      await db.collection("files").add({
        id: Date.now(),
        name: file.name,
        url: url,
        date: new Date().toLocaleDateString('vi-VN')
      });
      alert("Tải lên thành công!");
    } catch (err) {
      console.error(err);
      alert("Lỗi: Bạn cần chỉnh Rules trong Firebase Console sang 'allow write' mới up được!");
    }
    setIsUploading(false);
  };

  const deleteFile = async (docId) => {
    if(window.confirm("Xóa tài liệu này?")) {
      await db.collection("files").doc(docId).delete();
    }
  };

  return (
    <div className="space-y-6">
      <div className="flex justify-between items-center">
        <h3 className="text-xl font-bold text-emerald-900 uppercase">Thư viện bài giảng</h3>
        {isAdmin && (
          <label className="bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold cursor-pointer hover:bg-emerald-700 text-sm flex items-center gap-2 transition-all">
             {isUploading ? "⏳ Đang tải..." : "📤 Tải lên PDF"}
            <input type="file" onChange={upload} className="hidden" disabled={isUploading}/>
          </label>
        )}
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {files.length === 0 && <p className="text-slate-400 col-span-full text-center py-20 bg-white rounded-3xl border border-dashed border-slate-200 italic text-sm">Chưa có tài liệu nào được đăng tải.</p>}
        {files.map(f => (
          <div key={f.docId} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col hover:border-emerald-200 transition-all group">
            <div className="flex justify-between items-start mb-4">
               <div className="bg-emerald-50 text-emerald-600 w-10 h-10 rounded-xl flex items-center justify-center font-black text-xs">DOC</div>
               {isAdmin && <button onClick={() => deleteFile(f.docId)} className="text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">✕</button>}
            </div>
            <p className="font-bold text-slate-800 mb-1 line-clamp-1 text-sm">{f.name}</p>
            <p className="text-[10px] text-slate-400 mb-4 italic">Ngày: {f.date}</p>
            <a href={f.url} target="_blank" className="mt-auto bg-slate-900 text-white text-center py-3 rounded-xl font-bold text-xs hover:bg-emerald-600 transition-colors shadow-sm">XEM TÀI LIỆU</a>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ================= CHAT AI ================= */
const Chat = () => {
  const [msg, setMsg] = useState("");
  const [list, setList] = useState([]);
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [list]);

  const send = async () => {
    if (!msg.trim()) return;
    const userMsg = msg;
    setMsg("");
    setList(prev => [...prev, {role: "user", text: userMsg}]);
    setLoading(true);

    try {
      // DÁN API KEY CỦA BẠN VÀO ĐÂY ĐỂ AI HOẠT ĐỘNG
      const apiKey = ""; 
      if(!apiKey) throw new Error("Vui lòng dán Gemini API Key vào code!");

      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          contents: [{ parts: [{ text: "Hãy đóng vai một giáo viên GDQP, trả lời học sinh ngắn gọn câu hỏi sau: " + userMsg }] }]
        })
      });

      const data = await res.json();
      const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "AI không phản hồi.";
      setList(prev => [...prev, {role: "ai", text: aiResponse}]);
    } catch (err) {
      setList(prev => [...prev, {role: "ai", text: "Lỗi: " + err.message}]);
    }
    setLoading(false);
  };

  return (
    <div className="bg-white rounded-[40px] shadow-sm border h-[550px] flex flex-col overflow-hidden max-w-2xl mx-auto">
      <div className="bg-emerald-900 p-5 flex items-center gap-3 text-white">
        <div className="w-10 h-10 bg-white/20 rounded-2xl flex items-center justify-center text-xl">🤖</div>
        <div>
          <h4 className="font-bold text-sm">TRỢ LÝ AI GDQP</h4>
          <p className="text-[10px] text-emerald-300">Sẵn sàng giải đáp 24/7</p>
        </div>
      </div>

      <div className="flex-grow overflow-y-auto p-6 space-y-4 bg-slate-50/50">
        {list.length === 0 && <div className="text-center text-slate-400 text-xs py-20">Hãy đặt câu hỏi về kiến thức Quốc phòng...</div>}
        {list.map((m, i) => (
          <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
            <div className={`max-w-[85%] p-4 rounded-3xl text-sm shadow-sm ${m.role === 'user' ? 'bg-emerald-600 text-white rounded-br-none' : 'bg-white text-slate-800 rounded-tl-none border border-slate-100'}`}>
              {m.text}
            </div>
          </div>
        ))}
        {loading && <div className="text-[10px] text-emerald-600 font-bold animate-pulse">AI ĐANG SUY NGHĨ...</div>}
        <div ref={endRef} />
      </div>

      <div className="p-4 bg-white border-t flex gap-2">
        <input 
          value={msg} 
          onChange={e => setMsg(e.target.value)} 
          onKeyPress={e => e.key === 'Enter' && send()}
          placeholder="Hỏi AI bất cứ điều gì..." 
          className="flex-grow bg-slate-100 p-4 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-emerald-500 transition-all"
        />
        <button onClick={send} disabled={loading} className="bg-emerald-900 text-white px-6 py-4 rounded-2xl font-bold hover:bg-emerald-800 disabled:opacity-50 transition-all shadow-md">GỬI</button>
      </div>
    </div>
  );
};

/* ================= RENDER ================= */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>

</body>
</html>
